apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-runner
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-runner-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: github-runner
    namespace: default
---
apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: portfolio-runner
  namespace: default
spec:
  replicas: 1
  selector: {}
  template:
    metadata:
      labels:
        app: portfolio-runner
    spec:
      serviceAccountName: github-runner
      repository: xdearboy/website-rework
      labels:
        - self-hosted
        - linux
        - x64
        - k3s
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-runner-pat
              key: github_token
